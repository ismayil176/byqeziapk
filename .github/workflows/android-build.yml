name: Android native build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BYQEZI_UPLOAD_KEYSTORE_BASE64: ${{ secrets.BYQEZI_UPLOAD_KEYSTORE_BASE64 }}
      BYQEZI_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.BYQEZI_UPLOAD_KEYSTORE_PASSWORD }}
      BYQEZI_UPLOAD_KEY_ALIAS: ${{ secrets.BYQEZI_UPLOAD_KEY_ALIAS }}
      BYQEZI_UPLOAD_KEY_PASSWORD: ${{ secrets.BYQEZI_UPLOAD_KEY_PASSWORD }}
      BYQEZI_API_BASE_URL: ${{ secrets.BYQEZI_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Decode upload keystore if provided
        if: ${{ env.BYQEZI_UPLOAD_KEYSTORE_BASE64 != '' }}
        run: |
          printf '%s' "$BYQEZI_UPLOAD_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/byqezi-upload.jks"

      - name: Validate home round 7 base
        run: python3 scripts/validate_home_round7.py

      - name: Validate detail round 3 base
        run: python3 scripts/validate_detail_round3.py

      - name: Validate login/cabinet base
        run: python3 scripts/validate_login_cabinet_round1.py

      - name: Validate cabinet UI round 1 polish
        run: python3 scripts/validate_cabinet_ui_round1.py

      - name: Validate cabinet filter round 1
        run: python3 scripts/validate_cabinet_filter_round1.py

      - name: Validate add listing round 1
        run: python3 scripts/validate_add_listing_round1.py

      - name: Validate add listing compile fix
        run: python3 scripts/validate_add_listing_round1_compilefix.py

      - name: Validate add listing round 2 active selections
        run: python3 scripts/validate_add_listing_round2_active.py

      - name: Validate production prep round 3
        run: python3 scripts/validate_production_round3.py

      - name: Validate add listing round 4 polish
        run: python3 scripts/validate_add_listing_round4_polish.py

      - name: Validate round 5 real API safe area
        run: python3 scripts/validate_round5_real_api_safearea.py

      - name: Validate round 6 real data CSRF polish
        run: python3 scripts/validate_round6_real_data_csrf_polish.py

      - name: Validate round 7 session persistence
        run: python3 scripts/validate_round7_session_persistence.py

      - name: Validate round 8 promotions billing
        run: python3 scripts/validate_round8_promotions_billing.py

      - name: Validate round 9 real detail no demo
        run: python3 scripts/validate_round9_real_detail_no_demo.py

      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Build release AAB
        run: |
          if [ -f "$GITHUB_WORKSPACE/byqezi-upload.jks" ]; then
            export BYQEZI_UPLOAD_KEYSTORE="$GITHUB_WORKSPACE/byqezi-upload.jks"
            echo "Building signed release AAB with upload key."
          else
            echo "No upload keystore secret found. Building unsigned release AAB for structure check only."
          fi
          gradle --no-daemon :app:bundleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: byqezi-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: byqezi-release-aab
          path: app/build/outputs/bundle/release/*.aab
